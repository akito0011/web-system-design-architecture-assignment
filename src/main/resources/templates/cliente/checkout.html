<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <title>Conferma Check-out</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4 mb-5">
    <a class="navbar-brand" href="#">Hotel Manager</a>
</nav>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow border-0">
                <div class="card-header bg-danger text-white text-center py-3">
                    <h4 class="mb-0"><i class="bi bi-box-arrow-right"></i> Check-out</h4>
                </div>
                <div class="card-body p-4">

                    <div class="text-center mb-4">
                        <h5>Stai lasciando la camera <strong th:text="${prenotazione.camera.numero}">101</strong></h5>
                        <p class="text-muted" th:text="${prenotazione.camera.struttura.nome}">Grand Hotel</p>
                    </div>

                    <div class="alert alert-warning">
                        <i class="bi bi-exclamation-circle-fill"></i> Attenzione: confermando questa operazione il tuo soggiorno verrà terminato e non potrai più accedere ai servizi della camera.
                    </div>

                    <h6 class="mb-3 text-secondary text-uppercase small fw-bold">Conferma Dati Capogruppo</h6>

                    <form th:action="@{/cliente/conferma-checkout}" method="post">
                        <input type="hidden" name="idPrenotazione" th:value="${prenotazione.id}">

                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text" class="form-control bg-light" th:value="${capogruppo.nome}" readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Cognome</label>
                            <input type="text" class="form-control bg-light" th:value="${capogruppo.cognome}" readonly>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Email</label>
                            <input type="text" class="form-control bg-light" th:value="${capogruppo.email}" readonly>
                        </div>

                        <hr class="my-4">

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg shadow-sm">
                                Confermo e Termino Soggiorno
                            </button>
                            <a th:href="@{/cliente/dashboard}" class="btn btn-outline-secondary">
                                Annulla e Torna Indietro
                            </a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
