<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestione Domotica</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; padding: 20px; text-align: center; }
        .main-container { max-width: 900px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }

        /* Stile Card - IDENTICO A PRIMA */
        .device-card {
            background: white;
            border: 1px solid #e1e4e8;
            padding: 25px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h2 { border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; color: #333; display: inline-block; }

        /* Display Valori */
        .value-display { font-size: 2.5em; font-weight: bold; margin: 20px 0; color: #2c3e50; }
        .sub-text { color: #6c757d; margin-bottom: 20px; font-size: 0.9em; }

        /* Pulsanti */
        .actions-row { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }

        button { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 500; transition: all 0.2s; }

        /* Colori Bottoni Azione (Blu) */
        .btn-action { background-color: #007bff; color: white; }
        .btn-action:hover { background-color: #0056b3; transform: translateY(-1px); }

        /* Colori Bottoni Modalità (Grigio chiaro default) */
        .btn-mode { background-color: #e9ecef; color: #495057; border: 1px solid #ced4da; }
        .btn-mode:hover { background-color: #dee2e6; }

        /* Stati Attivi Modalità */
        .btn-mode.active-OFF { background-color: #6c757d; color: white; border-color: #6c757d; }
        .btn-mode.active-COOL { background-color: #17a2b8; color: white; border-color: #17a2b8; }
        .btn-mode.active-HEAT { background-color: #dc3545; color: white; border-color: #dc3545; }

        /* Alert Messaggi */
        .alert-box {
            background-color: #f8d7da; color: #721c24;
            padding: 15px; border-radius: 8px; margin-bottom: 30px;
            border: 1px solid #f5c6cb; max-width: 820px; margin-left: auto; margin-right: auto;
        }
        .alert-info {
            background-color: #cce5ff; color: #004085; border-color: #b8daff;
        }

        /* Stile Tasto Indietro */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            background-color: #6c757d;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: 500;
        }
        .back-btn:hover { background-color: #5a6268; }

        /* NUOVO: Stile per le Luci (coerente con il resto) */
        .btn-light-on { background-color: #ffc107; color: #212529; border: 1px solid #ffc107; } /* Giallo */
        .btn-light-off { background-color: #343a40; color: white; border: 1px solid #343a40; } /* Scuro */

    </style>
</head>
<body>

<a th:href="@{/cliente/dashboard}" class="back-btn">⬅ Torna alla Dashboard</a>

<h1 style="margin-bottom: 40px; color: #333;">Pannello Domotica</h1>

<div th:if="${errorMessage}" class="alert-box">
    <span th:text="${errorMessage}">Errore</span>
</div>
<div th:if="${erroreGenerale}" class="alert-box alert-info">
    <span th:text="${erroreGenerale}">Info</span>
</div>

<div th:if="${tapparella == null and termostato == null and (listaLuci == null or listaLuci.isEmpty())}"
     class="alert-box alert-info" style="max-width: 600px;">
    <h3>⚠ Nessun dispositivo trovato</h3>
    <p>In questa camera non ci sono dispositivi domotici configurati.</p>
</div>


<div class="main-container">

    <div class="device-card" th:if="${tapparella != null}">
        <h2>Tapparella</h2>
        <div class="value-display">
            <span th:text="${tapparella.livello}">0</span>%
        </div>
        <p class="sub-text">Percentuale Apertura</p>

        <div class="actions-row">
            <form th:action="@{/cliente/domotica/{id}/tapparelle/regola(id=${idPrenotazione})}" method="post">
                <input type="hidden" name="azione" value="INCREMENTA">
                <button type="submit" class="btn-action">Sali</button>
            </form>

            <form th:action="@{/cliente/domotica/{id}/tapparelle/regola(id=${idPrenotazione})}" method="post">
                <input type="hidden" name="azione" value="DECREMENTA">
                <button type="submit" class="btn-action">Scendi</button>
            </form>
        </div>
    </div>

    <div class="device-card" th:if="${termostato != null}">
        <h2>Termostato</h2>
        <div class="value-display">
            <span th:text="${termostato.temperatura}">20.0</span>°C
        </div>
        <p class="sub-text">Temperatura Target</p>

        <div class="actions-row" style="margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 20px;">
            <form th:action="@{/cliente/domotica/{id}/termostati/modalita(id=${idPrenotazione})}" method="post">
                <input type="hidden" name="modalita" value="OFF">
                <button type="submit" class="btn-mode"
                        th:classappend="${termostato.modalita.name() == 'OFF'} ? 'active-OFF'">OFF</button>
            </form>

            <form th:action="@{/cliente/domotica/{id}/termostati/modalita(id=${idPrenotazione})}" method="post">
                <input type="hidden" name="modalita" value="COOL">
                <button type="submit" class="btn-mode"
                        th:classappend="${termostato.modalita.name() == 'COOL'} ? 'active-COOL'">Freddo</button>
            </form>

            <form th:action="@{/cliente/domotica/{id}/termostati/modalita(id=${idPrenotazione})}" method="post">
                <input type="hidden" name="modalita" value="HEAT">
                <button type="submit" class="btn-mode"
                        th:classappend="${termostato.modalita.name() == 'HEAT'} ? 'active-HEAT'">Caldo</button>
            </form>
        </div>

        <div class="actions-row">
            <form th:action="@{/cliente/domotica/{id}/termostati/regola(id=${idPrenotazione})}" method="post">
                <input type="hidden" name="azione" value="INCREMENTA">
                <button type="submit" class="btn-action">Aumenta</button>
            </form>

            <form th:action="@{/cliente/domotica/{id}/termostati/regola(id=${idPrenotazione})}" method="post">
                <input type="hidden" name="azione" value="DECREMENTA">
                <button type="submit" class="btn-action">Diminuisci</button>
            </form>
        </div>
    </div>

    <div class="device-card" th:each="luce : ${listaLuci}">
        <h2 th:text="${luce.nome}">Luce</h2> <div class="value-display">
        <span th:if="${luce.stato.name() == 'ON'}" style="color: #ffc107;">ON</span>
        <span th:if="${luce.stato.name() == 'OFF'}" style="color: #6c757d;">OFF</span>
    </div>
        <p class="sub-text">Interruttore</p>

        <div class="actions-row">
            <form th:action="@{/cliente/domotica/{id}/luci/switch(id=${idPrenotazione})}" method="post">
                <input type="hidden" name="idLuce" th:value="${luce.id}">

                <button type="submit" style="width: 100%;"
                        th:class="${luce.stato.name() == 'ON'} ? 'btn-light-off' : 'btn-light-on'">
                    <span th:text="${luce.stato.name() == 'ON'} ? 'SPEGNI' : 'ACCENDI'">Azione</span>
                </button>
            </form>
        </div>
    </div>

</div>

</body>
</html>
