<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <title>Risultati Ricerca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4 mb-4">
    <a class="navbar-brand" href="#">Hotel Manager</a>
    <a th:href="@{/cliente/cerca(
            citta=${ricercaForm.citta},
            dataCheckin=${ricercaForm.dataCheckin},
            dataCheckout=${ricercaForm.dataCheckout},
            numOspiti=${ricercaForm.numOspiti})}"
       class="btn btn-outline-light btn-sm">
        <i class="bi bi-arrow-left"></i> Modifica Ricerca
    </a>
</nav>

<div class="container">

    <h3 class="mb-4">Strutture disponibili a <span class="text-primary" th:text="${ricercaForm.citta}">Palermo</span></h3>

    <div class="alert alert-light border shadow-sm mb-4">
        <i class="bi bi-calendar-check"></i> Dal <strong><span th:text="${ricercaForm.dataCheckin}"></span></strong>
        al <strong><span th:text="${ricercaForm.dataCheckout}"></span></strong>
        &bull; <i class="bi bi-people"></i> <strong><span th:text="${ricercaForm.numOspiti}"></span></strong> Ospiti
    </div>

    <div class="row">
        <div class="col-md-12 mb-4" th:each="s : ${strutture}">
            <div class="card shadow border-0 h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">

                        <div>
                            <h3 class="card-title text-primary fw-bold" th:text="${s.nome}">Grand Hotel</h3>
                            <p class="text-muted mb-3">
                                <i class="bi bi-geo-alt-fill"></i> <span th:text="${s.indirizzo} + ', ' + ${s.citta}">Via Roma, Palermo</span>
                            </p>

                            <div th:if="${!s.serviziDisponibili.isEmpty()}">
                                <small class="text-uppercase text-muted fw-bold" style="font-size: 0.75rem;">Servizi inclusi:</small><br>
                                <span th:each="serv : ${s.serviziDisponibili}"
                                      class="badge bg-secondary me-1 mt-1">
                                    <i class="bi bi-check-circle-fill me-1"></i><span th:text="${serv.nome}">Wifi</span>
                                </span>
                            </div>

                            <div th:if="${s.serviziDisponibili.isEmpty()}" class="text-muted small fst-italic">
                                Nessun servizio specifico indicato.
                            </div>
                        </div>

                        <div class="align-self-center ms-3">
                            <a th:href="@{/cliente/scelta-camera/{idStruttura}(
                                    idStruttura=${s.id},
                                    citta=${ricercaForm.citta},
                                    dataCheckin=${ricercaForm.dataCheckin},
                                    dataCheckout=${ricercaForm.dataCheckout},
                                    numOspiti=${ricercaForm.numOspiti},
                                    ospitiEsenti=${ricercaForm.ospitiEsenti}
                                )}"
                               class="btn btn-primary">
                                Vedi Camere
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
