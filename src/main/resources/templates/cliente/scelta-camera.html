<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <title>Scegli Camera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4 mb-4">
    <a class="navbar-brand" href="#">Hotel Manager</a>
    <a th:href="@{/cliente/risultati(
            citta=${ricercaForm.citta},
            dataCheckin=${ricercaForm.dataCheckin},
            dataCheckout=${ricercaForm.dataCheckout},
            numOspiti=${ricercaForm.numOspiti})}"
       class="btn btn-outline-light btn-sm">
        <i class="bi bi-arrow-left"></i> Cambia Hotel
    </a>
</nav>

<div class="container">

    <div class="text-center mb-5">
        <h2 class="display-6 fw-bold text-primary" th:text="${struttura.nome}">Grand Hotel Palermo</h2>
        <p class="text-muted lead">
            <i class="bi bi-geo-alt"></i> <span th:text="${struttura.indirizzo} + ', ' + ${struttura.citta}">Via Roma, Palermo</span>
        </p>

        <div class="d-inline-block bg-white border rounded-pill px-4 py-2 shadow-sm">
            <i class="bi bi-calendar"></i> <strong th:text="${ricercaForm.dataCheckin}"></strong>
            <i class="bi bi-arrow-right mx-2 text-muted"></i>
            <strong th:text="${ricercaForm.dataCheckout}"></strong>
            <span class="mx-2">|</span>
            <i class="bi bi-people"></i> <strong th:text="${ricercaForm.numOspiti}"></strong> Ospiti
        </div>
    </div>

    <h4 class="mb-3">Camere disponibili per te:</h4>

    <div class="row">
        <div class="col-md-6 col-lg-4 mb-4" th:each="c : ${camere}">
            <div class="card shadow-sm h-100 border-0">
                <div class="card-header bg-transparent border-0 pt-3">
                    <span class="badge bg-success float-end">Libera</span>
                    <h5 class="card-title fw-bold">Camera <span th:text="${c.numero}">101</span></h5>
                </div>

                <div class="card-body">
                    <div class="mb-3">
                        <small class="text-muted d-block text-uppercase fw-bold mb-1" style="font-size: 0.7rem;">Capienza</small>
                        <i class="bi bi-person-fill fs-5"></i> x <span class="fs-5 fw-bold" th:text="${c.capienza}">2</span> Persone
                    </div>

                    <div class="mb-3">
                        <small class="text-muted d-block text-uppercase fw-bold mb-1" style="font-size: 0.7rem;">Prezzo per notte</small>
                        <span class="text-primary fs-3 fw-bold" th:text="${c.prezzoBase} + '€'">90.00€</span>
                    </div>
                </div>

                <div class="card-footer bg-transparent border-0 pb-3">
                    <a th:href="@{/cliente/riepilogo(
                            idCamera=${c.id},
                            citta=${ricercaForm.citta},
                            dataCheckin=${ricercaForm.dataCheckin},
                            dataCheckout=${ricercaForm.dataCheckout},
                            numOspiti=${ricercaForm.numOspiti},
                            ospitiEsenti=${ricercaForm.ospitiEsenti}
                        )}"
                       class="btn btn-primary">
                        Prenota Ora
                    </a>
                </div>
            </div>
        </div>

        <div class="col-12" th:if="${camere.isEmpty()}">
            <div class="alert alert-warning text-center">
                Non ci sono camere disponibili in questo hotel per i criteri selezionati.
                <a th:href="@{/cliente/risultati(...)}" class="alert-link">Torna alla lista hotel</a>.
            </div>
        </div>
    </div>

</div>

</body>
</html>
