<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <title>Gestione Staff</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4 mb-4">
    <a class="navbar-brand" href="#">Admin Panel</a>
    <a th:href="@{/admin/dashboard}" class="btn btn-outline-light btn-sm">
        <i class="bi bi-arrow-left"></i> Dashboard
    </a>
</nav>

<div class="container">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-person-plus-fill"></i> Nuovo Staff</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/crea-staff}" method="post" th:object="${nuovoStaff}">
                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text" class="form-control" th:field="*{nome}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Cognome</label>
                            <input type="text" class="form-control" th:field="*{cognome}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email (Login)</label>
                            <input type="email" class="form-control" th:field="*{email}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" th:field="*{password}" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Crea Account</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Membri dello Staff Attivi</h5>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-light">
                        <tr>
                            <th class="ps-3">ID</th>
                            <th>Nome e Cognome</th>
                            <th>Email</th>
                            <th class="text-end pe-3">Azioni</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="u : ${listaStaff}">
                            <td class="ps-3" th:text="${u.id}">1</td>
                            <td>
                                <span class="fw-bold" th:text="${u.nome} + ' ' + ${u.cognome}">Mario Rossi</span>
                                <br><small class="text-muted">Ruolo: STAFF</small>
                            </td>
                            <td th:text="${u.email}">mario@hotel.it</td>
                            <td class="text-end pe-3">
                                <form th:action="@{/admin/elimina-staff}" method="post"
                                      onsubmit="return confirm('Sei sicuro di voler eliminare questo account?');">
                                    <input type="hidden" name="idUtente" th:value="${u.id}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i> Elimina
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${listaStaff.isEmpty()}">
                            <td colspan="4" class="text-center py-4 text-muted">
                                Nessun membro dello staff presente.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
