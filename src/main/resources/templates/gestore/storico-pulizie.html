<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <title>Storico Pulizie - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4 mb-4">
    <a class="navbar-brand" href="#">Admin Panel</a>
    <a th:href="@{/admin/dashboard}" class="btn btn-outline-light btn-sm">
        <i class="bi bi-arrow-left"></i> Torna alla Dashboard
    </a>
</nav>

<div class="container">
    <h3 class="mb-4"><i class="bi bi-clock-history"></i> Storico Completo Pulizie</h3>

    <div class="card shadow">
        <div class="card-body p-0">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-primary">
                <tr>
                    <th class="ps-4">ID</th>
                    <th>Data e Ora</th>
                    <th>Camera</th>
                    <th>Struttura</th>
                    <th>Staff Esecutore</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="log : ${storico}">
                    <td class="ps-4 text-muted small" th:text="${log.id}">1</td>
                    <td class="fw-bold" th:text="${#temporals.format(log.dataOra, 'dd/MM/yyyy HH:mm')}">Data</td>
                    <td th:text="${log.camera.numero}">101</td>
                    <td th:text="${log.camera.struttura.nome}">Hotel</td>
                    <td>
                        <span class="badge bg-info text-dark" th:text="${log.staff.nome} + ' ' + ${log.staff.cognome}">Mario</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
