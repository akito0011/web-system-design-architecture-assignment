<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <title>Accedi - Hotel Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="login-card">
    <h3 class="text-center mb-4">Benvenuto</h3>

    <div th:if="${param.error}" class="alert alert-danger text-center">
        Email o Password errati.
    </div>
    <div th:if="${param.logout}" class="alert alert-info text-center">
        Logout effettuato con successo.
    </div>
    <div th:if="${param.registered}" class="alert alert-success text-center">
        Registrazione completata! Ora puoi accedere.
    </div>

    <form th:action="@{/login}" method="post">

        <div class="mb-3">
            <label for="username" class="form-label">Email</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="nome@esempio.com" required autofocus>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2">Accedi</button>
    </form>

    <hr class="my-4">

    <div class="text-center">
        <p class="mb-1">Non hai un account?</p>
        <a th:href="@{/register}" class="text-decoration-none">Registrati qui</a>
    </div>
</div>

</body>
</html>
